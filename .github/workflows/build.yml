name: Build nv0ken_linux

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential nasm xorriso grub-pc-bin grub-common mtools

      - name: Build kernel
        shell: bash
        run: |
          set -o pipefail
          if ! bash build.sh kernel 2>&1 | tee build-kernel.log; then
            grep -E 'error:|undefined reference|relocation.*(overflow|truncated)|(^|[[:space:]])ld:' \
              build-kernel.log | tail -n 30 | while IFS= read -r line; do
                line="${line//'%'/'%25'}"
                line="${line//$'\r'/'%0D'}"
                line="${line//$'\n'/'%0A'}"
                echo "::error title=Kernel build::$line"
              done
            {
              echo '### Kernel build failure'
              echo '```text'
              tail -n 120 build-kernel.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Verify Multiboot2 image
        run: grub-file --is-x86-multiboot2 build/kernel.elf

      - name: Build userspace and desktop
        run: bash build.sh all --no-iso

      - name: Build GRUB ISO
        run: bash build.sh grub-iso

      - name: Upload boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nv0ken-linux-${{ github.sha }}
          path: |
            build/kernel.elf
            build/initrd.tar
            build/nv0ken-grub.iso
          if-no-files-found: error
